<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Работа с возражениями</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Bebas+Neue&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0A0A0A;
            color: #FFFFFF;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ===== CSS VARIABLES ===== */
        :root {
            --red-primary: #E31E24;
            --black: #0A0A0A;
            --white: #FFFFFF;
            --neon-pink: #FF006E;
            --neon-cyan: #00F5FF;
            --neon-purple: #9B59B6;
            --neon-yellow: #FFC107;
            --gradient-fire: linear-gradient(135deg, #E31E24 0%, #FF006E 100%);
            --gradient-cyber: linear-gradient(135deg, #00F5FF 0%, #9B59B6 100%);
            --font-primary: 'Inter', sans-serif;
            --font-display: 'Bebas Neue', sans-serif;
        }

        /* ===== BACKGROUND EFFECTS ===== */
        .neon-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--neon-cyan) 1px, transparent 1px),
                linear-gradient(90deg, var(--neon-cyan) 1px, transparent 1px);
            background-size: 100px 100px;
            opacity: 0.05;
            animation: grid-move 20s linear infinite;
            z-index: 0;
        }

        @keyframes grid-move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 100px); }
        }

        .glitch-overlay {
            position: fixed;
            inset: 0;
            background: var(--neon-pink);
            opacity: 0;
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: 9999;
        }

        /* ===== MAIN CONTAINER ===== */
        .quiz-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 700px;
        }

        /* ===== HEADER ===== */
        .quiz-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .quiz-title {
            font-size: 48px;
            font-weight: 900;
            font-family: var(--font-display);
            background: var(--gradient-fire);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transform: rotate(-3deg);
            margin-bottom: 15px;
            line-height: 1.1;
        }

        .quiz-subtitle {
            font-size: 20px;
            color: var(--neon-cyan);
            opacity: 0.8;
        }

        /* ===== PROGRESS BAR ===== */
        .quiz-progress {
            margin-bottom: 40px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient-cyber);
            width: 0%;
            transition: width 0.6s cubic-bezier(0.65, 0, 0.35, 1);
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .progress-text {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
            font-weight: 700;
            color: var(--neon-cyan);
        }

        .current-question {
            font-size: 32px;
            font-family: var(--font-display);
        }

        /* ===== QUESTION CARD ===== */
        .question-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 3px solid var(--neon-pink);
            border-radius: 30px;
            padding: 40px;
            transform: rotate(-1deg);
            transition: all 0.4s ease;
            box-shadow: 0 0 40px rgba(255, 0, 110, 0.3);
        }

        .question-card.correct-shake {
            animation: celebrate-pulse 0.6s ease;
        }

        .question-card.wrong-shake {
            animation: wrong-shake 0.5s ease;
        }

        @keyframes celebrate-pulse {
            0%, 100% { transform: rotate(-1deg) scale(1); }
            50% { transform: rotate(0deg) scale(1.02); }
        }

        @keyframes wrong-shake {
            0%, 100% { transform: rotate(-1deg) translateX(0); }
            25% { transform: rotate(-1deg) translateX(-10px); }
            75% { transform: rotate(-1deg) translateX(10px); }
        }

        .question-step-label {
            display: inline-block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 8px 16px;
            background: rgba(255, 0, 110, 0.2);
            border: 2px solid var(--neon-pink);
            border-radius: 20px;
            margin-bottom: 20px;
            color: var(--neon-pink);
        }

        .question-text {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 30px;
            color: var(--white);
        }

        /* ===== OPTIONS ===== */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px 25px;
            font-size: 18px;
            font-weight: 600;
            color: var(--white);
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-family: var(--font-primary);
            min-height: 60px;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .option-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--gradient-cyber);
            opacity: 0.1;
            transition: left 0.3s ease;
        }

        .option-btn:hover:not(.disabled) {
            border-color: var(--neon-cyan);
            transform: translateX(5px);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        .option-btn:hover:not(.disabled)::before {
            left: 0;
        }

        .option-btn:active:not(.disabled) {
            transform: translateX(5px) scale(0.98);
        }

        .option-btn.correct {
            border-color: var(--neon-cyan);
            background: rgba(0, 245, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.5);
            animation: correct-glow 0.6s ease;
        }

        .option-btn.wrong {
            border-color: var(--neon-pink);
            background: rgba(255, 0, 110, 0.2);
            animation: wrong-glitch 0.5s ease;
        }

        .option-btn.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        @keyframes correct-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 245, 255, 0.5); }
            50% { box-shadow: 0 0 50px rgba(0, 245, 255, 0.8); }
        }

        @keyframes wrong-glitch {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
        }

        /* ===== EXPLANATION ===== */
        .explanation-box {
            background: rgba(155, 89, 182, 0.15);
            border: 2px solid var(--neon-purple);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            display: none;
            opacity: 0;
            transform: translateY(-10px);
        }

        .explanation-box.show {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            animation: explanation-appear 0.5s ease forwards;
        }

        @keyframes explanation-appear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .explanation-icon {
            font-size: 32px;
            flex-shrink: 0;
        }

        .explanation-text {
            font-size: 16px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
        }

        /* ===== BUTTONS ===== */
        .quiz-btn {
            background: var(--gradient-fire);
            border: none;
            border-radius: 15px;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 700;
            color: var(--white);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.4);
            display: none;
            font-family: var(--font-primary);
            width: 100%;
        }

        .quiz-btn.show {
            display: inline-block;
        }

        .quiz-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 0, 110, 0.6);
        }

        .quiz-btn:active {
            transform: scale(0.98);
        }

        /* ===== RESULTS ===== */
        .quiz-results {
            display: none;
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 3px solid var(--neon-cyan);
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(0, 245, 255, 0.3);
        }

        .quiz-results.show {
            display: block;
            animation: results-appear 0.8s ease;
        }

        @keyframes results-appear {
            from {
                opacity: 0;
                transform: scale(0.9) rotate(-5deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        .results-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: icon-bounce 1s ease infinite;
        }

        @keyframes icon-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .results-title {
            font-size: 36px;
            font-weight: 900;
            font-family: var(--font-display);
            margin-bottom: 20px;
            background: var(--gradient-cyber);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .results-score {
            font-size: 72px;
            font-weight: 900;
            font-family: var(--font-display);
            margin-bottom: 20px;
            color: var(--neon-cyan);
            text-shadow: 0 0 30px var(--neon-cyan);
        }

        .score-total {
            font-size: 48px;
            opacity: 0.5;
        }

        .results-message {
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 40px;
            color: rgba(255, 255, 255, 0.8);
        }

        .results-breakdown {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }

        .breakdown-item {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .breakdown-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .breakdown-value {
            font-size: 36px;
            font-weight: 900;
            font-family: var(--font-display);
        }

        .correct-count {
            color: var(--neon-cyan);
            text-shadow: 0 0 20px var(--neon-cyan);
        }

        .wrong-count {
            color: var(--neon-pink);
            text-shadow: 0 0 20px var(--neon-pink);
        }

        .results-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .quiz-retry-btn {
            display: inline-block;
            width: auto;
        }

        /* ===== CONFETTI ===== */
        .confetti-particle {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 10000;
        }

        /* ===== COLOR VARIANTS ===== */
        .question-card.color-pink {
            border-color: var(--neon-pink);
            box-shadow: 0 0 40px rgba(255, 0, 110, 0.3);
        }

        .question-card.color-cyan {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 40px rgba(0, 245, 255, 0.3);
        }

        .question-card.color-purple {
            border-color: var(--neon-purple);
            box-shadow: 0 0 40px rgba(155, 89, 182, 0.3);
        }

        .question-card.color-yellow {
            border-color: var(--neon-yellow);
            box-shadow: 0 0 40px rgba(255, 193, 7, 0.3);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .quiz-title {
                font-size: 36px;
            }

            .question-card {
                padding: 30px 25px;
            }

            .question-text {
                font-size: 20px;
            }

            .option-btn {
                padding: 18px 20px;
                font-size: 16px;
                min-height: 70px;
            }

            .results-score {
                font-size: 56px;
            }

            .results-breakdown {
                flex-direction: column;
                gap: 20px;
            }

            .results-actions {
                flex-direction: column;
            }

            .quiz-btn {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .quiz-title {
                font-size: 32px;
            }

            .question-text {
                font-size: 18px;
            }

            .option-btn {
                font-size: 15px;
                padding: 16px 18px;
                min-height: 65px;
            }

            .results-title {
                font-size: 28px;
            }

            .results-score {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="neon-grid"></div>
    <div class="glitch-overlay"></div>

    <!-- Quiz Wrapper -->
    <div class="quiz-wrapper">
        <!-- Header -->
        <div class="quiz-header">
            <h1 class="quiz-title">Проверь себя</h1>
            <p class="quiz-subtitle">Работа с возражениями</p>
        </div>

        <!-- Progress Bar -->
        <div class="quiz-progress">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="progress-text">
                <span class="current-question">1</span> / <span class="total-questions">8</span>
            </div>
        </div>

        <!-- Question Card -->
        <div class="question-card">
            <div class="question-step-label"></div>
            <h3 class="question-text"></h3>

            <!-- Options Grid -->
            <div class="options-container"></div>

            <!-- Explanation -->
            <div class="explanation-box">
                <div class="explanation-icon">💡</div>
                <p class="explanation-text"></p>
            </div>

            <!-- Next Button -->
            <button class="quiz-btn quiz-next-btn">
                Следующий вопрос →
            </button>
        </div>

        <!-- Results Screen -->
        <div class="quiz-results">
            <div class="results-icon"></div>
            <h3 class="results-title"></h3>
            <div class="results-score">
                <span class="score-number"></span>
                <span class="score-total"></span>
            </div>
            <p class="results-message"></p>

            <!-- Results Breakdown -->
            <div class="results-breakdown">
                <div class="breakdown-item">
                    <span class="breakdown-label">Правильно:</span>
                    <span class="breakdown-value correct-count"></span>
                </div>
                <div class="breakdown-item">
                    <span class="breakdown-label">Неправильно:</span>
                    <span class="breakdown-value wrong-count"></span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="results-actions">
                <button class="quiz-btn quiz-retry-btn">
                    🔄 Пройти снова
                </button>
            </div>
        </div>
    </div>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="quiz-standalone.js"></script>
</body>
</html>
